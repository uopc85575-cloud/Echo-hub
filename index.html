<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Node Network</title>
    <style>
        body {
            background-color: #0b0b14;
            color: #ffffff;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* Subtle background glow */
        body::before {
            content: "";
            position: absolute;
            width: 300px;
            height: 300px;
            background: rgba(127, 0, 255, 0.15);
            filter: blur(100px);
            border-radius: 50%;
            z-index: -1;
        }

        .container {
            text-align: center;
            padding: 20px;
        }

        h1 {
            font-size: 3rem;
            letter-spacing: -1px;
            margin-bottom: 10px;
            background: linear-gradient(to bottom, #fff, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: #94a3b8;
            font-size: 1.1rem;
            margin-bottom: 40px;
            max-width: 400px;
            line-height: 1.6;
        }

        .launch-btn {
            display: inline-block;
            background: linear-gradient(45deg, #ff007f, #7f00ff);
            color: white;
            padding: 18px 45px;
            border: none;
            border-radius: 12px; /* Switched to rounded corners for a modern UI feel */
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            box-shadow: 0 10px 25px -5px rgba(127, 0, 255, 0.4);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .launch-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 30px -10px rgba(255, 0, 127, 0.5);
            filter: brightness(1.1);
        }

        .launch-btn:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Secure Node Network</h1>
        <p>Encrypted access to unblocked environments. Safe, fast, and private.</p>
        <a href="/proxy" class="launch-btn">Launch Application</a>
    </div>

</body>
</html>
